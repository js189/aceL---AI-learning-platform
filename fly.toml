# Fly.io: install CLI https://fly.io/docs/hands-on/install-flyctl/
#   fly launch --no-deploy   (uses this file)
#   fly secrets set NEXTAUTH_URL=... NEXTAUTH_SECRET=... (etc.)
#   fly deploy
app = "acel-learning"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
